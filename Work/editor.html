<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сверка переводов</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { display: flex; gap: 20px; }
        .column { flex: 1; }
        textarea { width: 100%; height: 200px; font-family: monospace; font-size: 14px; }
        h3 { margin: 10px 0; }
        .item { border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; border-radius: 8px; }
        button { padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Сверка переводов (diff.json)</h1>
    <input type="file" id="fileInput" accept=".json">
    <button onclick="saveJson()">Скачать обновлённый JSON</button>
    <hr>
    <div id="content"></div>

    <script>
        let data = {};

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                data = JSON.parse(ev.target.result);
                renderItems();
            };
            reader.readAsText(file, 'UTF-8');
        });

        function renderItems() {
            const content = document.getElementById('content');
            content.innerHTML = '';
            for (const [key, value] of Object.entries(data)) {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <h3>Ключ: ${key}</h3>
                    <div class="container">
                        <div class="column">
                            <label><strong>English</strong></label>
                            <textarea id="eng_${key}">${value.eng || ''}</textarea>
                        </div>
                        <div class="column">
                            <label><strong>Русский</strong></label>
                            <textarea id="rus_${key}">${value.rus || ''}</textarea>
                        </div>
                    </div>
                `;
                content.appendChild(div);
            }
        }

        function saveJson() {
            for (const [key, value] of Object.entries(data)) {
                const eng = document.getElementById(`eng_${key}`);
                const rus = document.getElementById(`rus_${key}`);
                if (eng) data[key].eng = eng.value;
                if (rus) data[key].rus = rus.value;
            }

            const blob = new Blob([JSON.stringify(data, null, 4)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'diff_fixed.json';
            a.click();
        }
    </script>
</body>
</html>
